<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example 3 Table</title>
    <style>
        caption{
            text-align: right;
            caption-side: bottom;
        }
        .col-group-1{
            background-color: #ffcccc;
        }
         .col-group-2{
            background-color: #ff9999;
        }
        .col-group-3{
            background-color: #cc9999;
        }
        thead{
            color: #ffff00;
        }
        tfoot{
            color:#ffffff;
        }
    </style>
</head>
<body>
    <!-- table>tr*5>td*7{cell} -->
     <table>
        <caption>Title of Table</caption>
        <colgroup>
            <col span="2" class="col-group-1">
            <col span="4" class="col-group-2">
            <col class="col-group-3">
        </colgroup>
        <thead>
            <tr>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
            </tr>
        </thead>
        <tfoot>
            <tr>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
                <th>cell</th>
            </tr>
        </tfoot>
        <tbody>
            <tr>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
            </tr>
            <tr>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
            </tr>
            <tr>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
                <td>cell</td>
            </tr>
        </tbody>
     </table>
    
</body>
</html>
