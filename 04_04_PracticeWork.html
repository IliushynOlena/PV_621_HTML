<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Work</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 100%;
            background-color: gainsboro;
            border-collapse: collapse;
            text-align: center;
            color: white;
        }

        caption {
            text-transform: uppercase;
            text-align: right;
            font-weight: bold;
            color: gray;
        }

        th,
        td {
            padding: 10px;
        }

        thead,
        tfoot {
            text-transform: uppercase;
        }

        thead {
            border-bottom: 1px solid white;
        }

        tfoot {
            border-top: 1px solid white;
        }

        .col-2 {
            background-color: rgb(17, 240, 240);
        }

        .col-3 {
            background-color: rgb(48, 193, 84);
        }

        .col-4 {
            background-color: rgb(242, 213, 22);
        }

        .col-5 {
            background-color: rgb(240, 73, 17);
        }

        td:first-child {
            text-align: left;
        }

        th:first-child,
        td:first-child {
            color: gray;
        }
        div{
            border: 3px solid grey;
            padding: 7px;
        }
        td span{
            border: 1px solid white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: inline-block;
            line-height: 25px;         
        }
    </style>
</head>
