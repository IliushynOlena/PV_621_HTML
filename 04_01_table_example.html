<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table exapmle 1</title>
    <style>
        table{
            border: 1px solid black;
            /* border-collapse: collapse; */
            border-collapse: separate;
            border-spacing: 10px;
            background-color: #aaaaaa;
            background-image: url(./img/bg_1.jpg);
            empty-cells: hide;
        }
        tr{
            background-color: #cccccc;
             background-image: url(./img/bg_2.jpg);
        }
        th{
            border: 1px solid red;          
        }
        td{
            border: 1px solid blue;
        }
        #uniq{
            width: 30vw;
            height: 20vh;
            text-align: right;
            vertical-align: bottom;
            background-color: #eeeeee;
            background-image: url(./img/bg_3.jpg);
        }
    </style>
</head>
<body>

    <table>
        <!-- tr - один рядок таблиці -->
        <!-- th - одна клітинка з шапкою таблиці -->
        <!-- td - одна клітинка з самою інофрмацією -->
        <tr>
            <!-- th*3{Column 1} -->
             <th>Column 1</th>
             <th>Column 2</th>
             <th>Column 3</th>
        </tr>
        <!-- tr*3>td*3>lorem3 -->
         <tr>
            <td>Lorem, ipsum dolor.</td>
            <td>Amet, cum deserunt?</td>
            <td>Aliquam, qui in.</td>
         </tr>
         <tr>
            <td>Lorem, ipsum dolor.</td>
            <td id="uniq">Provident, enim dolor!</td>
            <td>Iusto, commodi magnam.</td>
         </tr>
         <tr>
            <td>Lorem, ipsum dolor.</td>
            <td>Nam, culpa laboriosam?</td>
            <td></td>
         </tr>
    </table>
    
</body>
</html>
